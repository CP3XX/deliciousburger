<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicious Burguer</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->

  <section id="login">

    <h1>Bienvenido</h1>
    <h2>Delicious Burguer</h2>

    <input type="text" id="nombre" placeholder="Nombre y apellido">

    <input type="number" id="telefono" placeholder="Número telefónico">

    <input type="text" id="direccion" placeholder="Dirección">

    <button onclick="entrar()">ENTRAR</button>

  </section>

  <!-- CATEGORÍAS -->

  <section id="categorias" class="oculto">

    <h1>Bienvenido</h1>

    <div class="categorias">

      <button class="circulo" onclick="mostrarMenu()">
        Hamburguesas
      </button>

      <button class="circulo">
        Pizzas
      </button>

    </div>

  </section>

  <!-- MENU -->

  <section id="menu" class="oculto">

    <h1>Delicious Burguer</h1>

    <div id="productos"></div>

    <button class="carrito-btn" onclick="verCarrito()">
      🛒 Ver carrito
    </button>

  </section>

  <!-- PERSONALIZAR -->

  <section id="personalizar" class="oculto">

    <img id="imgProducto" src="" alt="">

    <h2 id="nombreProducto"></h2>

    <h3 id="precioProducto"></h3>

    <div class="checks">

      <label>
        <input type="checkbox" id="conTodo">
        Con todo
      </label>

      <label>
        <input type="checkbox" class="opcion">
        Sin cebolla
      </label>

      <label>
        <input type="checkbox" class="opcion">
        Sin salsa de piña
      </label>

      <label>
        <input type="checkbox" class="opcion">
        Sin vegetales
      </label>

      <label>
        <input type="checkbox" class="opcion">
        Sin salsas
      </label>

    </div>

    <button onclick="agregarCarrito()">
      AGREGAR
    </button>

  </section>

  <!-- CARRITO -->

  <section id="carrito" class="oculto">

    <h1>Tu pedido</h1>

    <div id="listaCarrito"></div>

    <hr>

    <h3>Domicilio: $2.000</h3>

    <div class="gaseosas">

      <h3>Gaseosa personal ($2500)</h3>

      <div class="contador">

        <button onclick="menosGaseosa()">-</button>

        <span id="cantidadGaseosa">0</span>

        <button onclick="masGaseosa()">+</button>

      </div>

    </div>

    <div class="metodo">

      <h3>Método de pago</h3>

      <label>
        <input type="radio" name="pago" value="Efectivo">
        Efectivo
      </label>

      <label>
        <input type="radio" name="pago" value="Transferencia">
        Transferencia
      </label>

    </div>

    <h2 id="total"></h2>

    <button onclick="realizarPedido()">
      📲 Realizar pedido
    </button>

  </section>

  <script src="script.js"></script>

</body>
</html>
